# DGM MVP Configuration
# Foundation Model Provider Settings
fm_providers:
  # Primary provider for MVP
  primary: anthropic
  
  # Gemini Configuration
  gemini:
    model: gemini-2.5-flash-preview-05-20
    api_key: ${GEMINI_API_KEY}
    max_tokens: 8192
    temperature: 0.1
    timeout: 60
  
  # Anthropic Configuration
  anthropic:
    model: claude-sonnet-4-6
    api_key: ${ANTHROPIC_API_KEY}
    max_tokens: 8192
    temperature: 0.1
    timeout: 60
  
  # OpenAI Configuration (placeholder)
  openai:
    model: gpt-4
    api_key: ${OPENAI_API_KEY}
    max_tokens: 8192
    temperature: 0.1
    timeout: 60

# DGM System Settings
dgm_settings:
  max_iterations: 100
  pause_after_iteration: true
  sandbox_timeout: 300
  max_concurrent_evaluations: 1
  
# Archive Settings
archive:
  path: archive/agents

# Parent Selection Configuration (paper formula parameters)
parent_selection:
  lambda: 10
  alpha_0: 0.5
  
# Evaluation Settings
evaluation:
  benchmarks_dir: config/benchmarks
  results_dir: results
  timeout_seconds: 30
  use_sandbox: false

# Optional Docker sandbox settings for benchmark test scripts plus agent bash
# and edit tool operations. The model orchestration loop and controller/archive
# logic still run in the configured host workspace.
sandbox:
  image_name: dgm-sandbox
  memory_limit: 2g
  cpu_limit: "1"
  timeout: 300
  network_mode: none
  working_dir: /home/dgm_agent/workspace
  auto_build_image: true
  
# Agent Settings
agents:
  workspace_dir: agents/workspace
  initial_agent_path: agent/agent.py
  max_steps: 20
  
# Benchmarks Configuration
benchmarks:
  timeout_default: 30
  max_attempts: 3
  enabled:
    - string_manipulation
    - list_processing
    - simple_algorithm

# Logging Configuration
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/dgm.log

# Safety Settings
safety:
  max_modification_size: 10000  # Max characters in a single modification
  backup_generations: 5         # Keep N backups of each agent
  allowed_imports:              # Restricted import list for safety
    - os
    - sys
    - json
    - yaml
    - typing
    - dataclasses
    - pathlib
    - subprocess
    - time
    - datetime
