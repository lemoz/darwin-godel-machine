fm_providers:
  primary: runner
  runner:
    handler: openai_compatible
    api_key: ${OPENROUTER_API_KEY}
    base_url: https://openrouter.ai/api/v1
    max_tokens: 2048
    temperature: 0.1
    timeout: 120
    timeout_retries: 1
    timeout_retry_delay: 1
    model: google/gemini-3.5-flash
  self_mutator:
    handler: openai_compatible
    api_key: ${OPENROUTER_API_KEY}
    base_url: https://openrouter.ai/api/v1
    max_tokens: 1024
    temperature: 0.2
    timeout: 120
    timeout_retries: 0
    tool_choice_policy: required_read_then_workspace_change
    model: google/gemini-3.5-flash
archive:
  path: .dgm-live-runs/heldout-transfer-20260715/gemini35-transfer/archive
parent_selection:
  lambda: 10
  alpha_0: 0.5
  require_non_regression: true
  require_per_benchmark_non_regression: true
  regression_tolerance: 0.0
evaluation:
  benchmarks_dir: .dgm-live-runs/livecodebench-heldout12/benchmarks
  results_dir: .dgm-live-runs/heldout-transfer-20260715/gemini35-transfer/results
  timeout_seconds: 30
  use_sandbox: false
sandbox:
  image_name: dgm-sandbox
  memory_limit: 2g
  cpu_limit: '1'
  timeout: 43200
  network_mode: none
  working_dir: /home/dgm_agent/workspace
  auto_build_image: true
agents:
  workspace_dir: .dgm-live-runs/heldout-transfer-20260715/gemini35-transfer/workspace
  initial_agent_path: agent/agent.py
  max_steps: 7
self_modification:
  fm_provider: self_mutator
  max_steps: 3
  max_consecutive_noop_mutations: 8
benchmarks:
  timeout_default: 30
  max_attempts: 3
  enabled:
  - livecodebench_abc391_a
  - livecodebench_abc392_a
  - livecodebench_abc393_a
  - livecodebench_abc394_a
  - livecodebench_abc391_d
  - livecodebench_abc392_d
  - livecodebench_abc392_c
  - livecodebench_abc394_c
  - livecodebench_abc394_d
  - livecodebench_abc391_e
  - livecodebench_abc392_f
  - livecodebench_abc394_e
target_performance: 1.0
logging:
  level: INFO
generation_delay_seconds: 0
stop_on_error: true
live_run:
  purpose: livecodebench_heldout_transfer
  approval_required: true
  recommended_generations: 0
  matrix:
    name: livecodebench_heldout_transfer
    phase: calibration
    model_slug: gemini35-transfer
    runner_model: google/gemini-3.5-flash
    mutation_model: google/gemini-3.5-flash
    mutation_mode: none_frozen_replay
  segment:
    config: config/livecodebench_segment_heldout12.yaml
    manifest_path: .dgm-live-runs/livecodebench-heldout12/manifest.json
    segment_id: release_v6_atcoder_heldout12
    benchmark_count: 12
    prompt_examples_are_public_only: true
    scored_tests_include_private: true
    disjoint_from: release_v6_atcoder_loop12
  transfer:
    proof_archive: docs/live-runs/lcb-self-elicitation-broad8-20260714-1/workers/sebc-e1-20260714b-gemini35-flash-w01/archive.tar.gz
    replicates: 2
    agents:
    - id: ea98b448-ee41-472d-9c7e-6d2adfffa344
      label: native
    - id: b4061d8a-bc4b-4d87-9fcc-bd405a768711
      label: solver-policy-7-to-9
    - id: 93d22ff9-cc23-4935-b029-8bf755ab9dbe
      label: selected-top-7-to-10
  cost_gate:
    max_estimated_cost_usd: 60
    solver_input_price_per_mtok: 1.5
    solver_output_price_per_mtok: 9.0
    max_enabled_benchmarks: 12
    max_output_tokens_per_call: 2048
  required_preflight:
  - PATH="$PWD/.venv/bin:$PATH" python scripts/prepare_livecodebench_segment.py --config config/livecodebench_segment_heldout12.yaml
  - PATH="$PWD/.venv/bin:$PATH" python scripts/seed_archive_from_proof.py --archive-tar docs/live-runs/lcb-self-elicitation-broad8-20260714-1/workers/sebc-e1-20260714b-gemini35-flash-w01/archive.tar.gz --target-archive .dgm-live-runs/heldout-transfer-20260715/gemini35-transfer/archive --agent-id ea98b448-ee41-472d-9c7e-6d2adfffa344 --agent-id b4061d8a-bc4b-4d87-9fcc-bd405a768711 --agent-id 93d22ff9-cc23-4935-b029-8bf755ab9dbe --min-focus-score 0 --output .dgm-live-runs/heldout-transfer-20260715/gemini35-transfer/archive/seed-manifest.json --force
  - PATH="$PWD/.venv/bin:$PATH" python scripts/rescore_archive_agents.py --config config/generated/heldout_transfer_matrix/gemini35-transfer-calibration.yaml --agent-id ea98b448-ee41-472d-9c7e-6d2adfffa344 --agent-id b4061d8a-bc4b-4d87-9fcc-bd405a768711 --agent-id 93d22ff9-cc23-4935-b029-8bf755ab9dbe --replicates 2 --prune-unselected --output .dgm-live-runs/heldout-transfer-20260715/gemini35-transfer/archive/transfer.json
