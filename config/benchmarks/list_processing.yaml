name: list_processing
description: Tests agent's ability to process and manipulate lists
difficulty: easy
timeout: 30
category: data_structures

task_prompt: |
  Write a Python function called `reverse_list` that reverses a list and returns
  the reversed list. Do not use the built-in reverse() method or [::-1] slicing.

  Example:
  ```python
  result = reverse_list([1, 2, 3, 4, 5])
  print(result)  # Output: [5, 4, 3, 2, 1]
  ```

test_cases:
  - function_name: reverse_list
    task_description: reverses a list and returns the reversed result without using built-in reverse methods
    inputs:
      - "[1, 2, 3, 4, 5]"
      - "['a', 'b', 'c']"
      - "[]"
      - "[1]"
    expected_outputs:
      - "[5, 4, 3, 2, 1]"
      - "['c', 'b', 'a']"
      - "[]"
      - "[1]"

scoring:
  method: binary
  strict: false
