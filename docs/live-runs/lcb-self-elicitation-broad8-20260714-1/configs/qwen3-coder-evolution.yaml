fm_providers:
  primary: runner
  runner:
    handler: openai_compatible
    api_key: ${OPENROUTER_API_KEY}
    base_url: https://openrouter.ai/api/v1
    max_tokens: 2048
    temperature: 0.1
    timeout: 120
    timeout_retries: 1
    timeout_retry_delay: 1
    model: qwen/qwen3-coder
  self_mutator:
    handler: openai_compatible
    api_key: ${OPENROUTER_API_KEY}
    base_url: https://openrouter.ai/api/v1
    max_tokens: 1024
    temperature: 0.2
    timeout: 120
    timeout_retries: 0
    tool_choice_policy: required_read_then_workspace_change
    model: qwen/qwen3-coder
archive:
  path: .dgm-live-runs/self-elicitation-broad-credible-20260714/evolution/qwen3-coder/archive
parent_selection:
  lambda: 10
  alpha_0: 0.5
  require_non_regression: true
  require_per_benchmark_non_regression: true
  regression_tolerance: 0.0
  reject_score_ties: false
  elite_selection_probability: 0.0
evaluation:
  benchmarks_dir: .dgm-live-runs/livecodebench-loop12/benchmarks
  results_dir: .dgm-live-runs/self-elicitation-broad-credible-20260714/evolution/qwen3-coder/results
  timeout_seconds: 30
  use_sandbox: false
sandbox:
  image_name: dgm-sandbox
  memory_limit: 2g
  cpu_limit: '1'
  timeout: 43200
  network_mode: none
  working_dir: /home/dgm_agent/workspace
  auto_build_image: true
agents:
  workspace_dir: .dgm-live-runs/self-elicitation-broad-credible-20260714/evolution/qwen3-coder/workspace
  initial_agent_path: agent/agent.py
  max_steps: 7
self_modification:
  fm_provider: self_mutator
  max_steps: 3
  max_consecutive_noop_mutations: 8
  constrained_mutation:
    enabled: true
    max_agent_iterations: 24
    protected_symbols:
      agent.py:
      - Agent._build_system_message
      - Agent._is_task_complete
      - Agent._extract_code_solution
      - Agent._read_workspace_solution
      - Agent._benchmark_completion_block_reason
benchmarks:
  timeout_default: 30
  max_attempts: 3
  enabled:
  - livecodebench_abc387_b
  - livecodebench_abc388_b
  - livecodebench_abc389_a
  - livecodebench_abc390_b
  - livecodebench_abc387_c
  - livecodebench_abc388_d
  - livecodebench_abc388_c
  - livecodebench_abc389_d
  - livecodebench_abc390_d
  - livecodebench_abc388_e
  - livecodebench_abc389_e
  - livecodebench_abc390_e
target_performance: 1.0
logging:
  level: INFO
generation_delay_seconds: 0
stop_on_error: true
live_run:
  purpose: livecodebench_self_elicitation_broad_credible_evolution
  approval_required: true
  recommended_generations: 15
  matrix:
    name: livecodebench_self_elicitation_broad_credible
    phase: evolution
    model_slug: qwen3-coder
    runner_model: qwen/qwen3-coder
    mutation_model: qwen/qwen3-coder
    mutation_mode: self
  segment:
    config: config/livecodebench_segment_loop12.yaml
    manifest_path: .dgm-live-runs/livecodebench-loop12/manifest.json
    segment_id: release_v6_atcoder_loop12
    benchmark_count: 12
    expected_total_tests_min: 400
    expected_private_tests_min: 350
    source: https://huggingface.co/datasets/livecodebench/code_generation_lite
    upstream: https://github.com/livecodebench/livecodebench
    prompt_examples_are_public_only: true
    scored_tests_include_private: true
  cost_gate:
    pricing_checked_at: 2026-07-14
    pricing_source: https://openrouter.ai/api/v1/models
    solver_input_price_per_mtok: 0.22
    solver_output_price_per_mtok: 1.8
    mutation_input_price_per_mtok: 0.22
    mutation_output_price_per_mtok: 1.8
    assumed_input_tokens_per_call: 12000
    max_estimated_cost_usd: 100
    max_generations_without_reapproval: 15
    max_agent_steps: 7
    max_self_modification_steps: 3
    max_output_tokens_per_call: 2048
    max_enabled_benchmarks: 12
  post_run_scorecard:
    command: PATH="$PWD/.venv/bin:$PATH" python scripts/summarize_archive_scores.py --archive-metadata .dgm-live-runs/self-elicitation-broad-credible-20260714/evolution/qwen3-coder/archive/archive_metadata.json --output .dgm-live-runs/self-elicitation-broad-credible-20260714/evolution/qwen3-coder/archive/scorecard.json
    require_improvement: false
  seed_mode: fresh_native
  parallel:
    workers: 2
    max_concurrency: 8
    seed_changed_count: 0
    seed_noop_count: 0
    shared_max_budget_usd: 290
    budget_poll_seconds: 5
  baseline_agent: agent/agent.py
  baseline_initialization: DGMController._initialize_base_agent evaluates the common base agent once per isolated worker before generation 1
  required_preflight:
  - PATH="$PWD/.venv/bin:$PATH" python scripts/prepare_livecodebench_segment.py --config config/livecodebench_segment_loop12.yaml
  - PATH="$PWD/.venv/bin:$PATH" python scripts/verify_sandbox_docker.py --build-image --require
